packages:
  - server

# 公開から 7 日経過したバージョンのみ解決する（分単位: 7 * 24 * 60）
minimumReleaseAge: 10080

allowBuilds:
  '@nestjs/core': true
  '@openapitools/openapi-generator-cli': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  core-js-pure: true
  cpu-features: true
  esbuild: true
  prisma: true
  ssh2: true
